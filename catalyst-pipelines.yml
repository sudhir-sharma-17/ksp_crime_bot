version: 1.0

stages:
  - name: deploy_stage
    jobs:
      - name: build_and_deploy
        steps:
          - npm install -g zcatalyst-cli@1.27.0
          - catalyst deploy appsail \
              --name aloka-backend-dev \
              --build-path ./backend \
              --stack python_3_10 \
              --command "python -m uvicorn app.app:app --host 0.0.0.0 --port 9000" \
              --project 45673000000037001 \
              --token $CATALYST_TOKEN \
              --verbose
version: 1.0
images:
  build_env:
    image: nikolaik/python-nodejs:python3.10-nodejs18
jobs:
  build_and_deploy:
    image: build_env
    steps:
      - npm install -g zcatalyst-cli
      - cd backend
      - pip install -r requirements.txt -t .
      - cd ..
      - catalyst deploy --token $CATALYST_TOKEN --project 45673000000037001
stages:
  - name: deploy_stage
    jobs:
      - build_and_deploy
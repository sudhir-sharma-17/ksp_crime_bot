version: 1.0
jobs:
  build_and_deploy:
    steps:
      - npm install -g zcatalyst-cli
      - cd backend
      # Force login and deployment targeting your specific project ID using the CATALYST_TOKEN
      - catalyst deploy --token $CATALYST_TOKEN --project 45673000000037001
stages:
  - name: deploy_stage
    jobs:
      - build_and_deploy
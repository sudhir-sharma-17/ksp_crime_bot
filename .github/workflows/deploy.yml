name: Continuous Integration Chatbot Auto-Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Source Code from GitHub
        uses: actions/checkout@v4

      - name: Initialize Environment Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache and Install Zoho Catalyst Suite
        run: npm install -g zcatalyst-cli

      - name: Compile Modules and Push to Production Cloud
        run: catalyst deploy --token ${{ secrets.ZOHO_CATALYST_TOKEN }}
